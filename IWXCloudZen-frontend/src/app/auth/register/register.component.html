<div class="min-h-screen flex items-center justify-center bg-white px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-serif font-bold tracking-tight text-black">IWX CloudZen</h1>
      <p class="text-sm text-gray-500 mt-2">Create your account</p>
    </div>

    <div *ngIf="successMessage" class="mb-6 p-3 bg-green-50 border border-green-200 text-green-600 text-sm">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="mb-6 p-3 bg-red-50 border border-red-200 text-red-600 text-sm">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Full Name</label>
        <input type="text" formControlName="name" class="w-full border-b border-gray-300 py-3 text-lg focus:outline-none focus:border-black transition-colors">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Phone Number</label>
        <input type="tel" formControlName="phoneNumber" class="w-full border-b border-gray-300 py-3 text-lg focus:outline-none focus:border-black transition-colors">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Email</label>
        <input type="email" formControlName="email" class="w-full border-b border-gray-300 py-3 text-lg focus:outline-none focus:border-black transition-colors">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Password</label>
        <input type="password" formControlName="password" class="w-full border-b border-gray-300 py-3 text-lg focus:outline-none focus:border-black transition-colors">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="w-full border-b border-gray-300 py-3 text-lg focus:outline-none focus:border-black transition-colors">
        <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="text-red-500 text-xs mt-1">
          Passwords do not match
        </div>
      </div>

      <button type="submit" [disabled]="loading"
              class="btn w-full !py-3">
        {{ loading ? 'Creating account...' : 'Sign Up' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Already have an account?
      <a routerLink="/login" class="text-black hover:underline">Sign in</a>
    </p>
  </div>
</div>
