<div class="global-search-wrapper">
  <div class="search-bar">
    <div class="search-fields">
      <div class="search-input-group">
        <label class="block text-xs uppercase tracking-widest mb-1 text-gray-500">Service / Resource</label>
        <input
          #searchInput
          type="text"
          [(ngModel)]="query"
          (input)="onInput()"
          (keydown)="onKeyDown($event)"
          (focus)="query.trim().length >= 2 && (isOpen = true)"
          placeholder="Search services, resources, pages…"
          class="w-full bg-transparent border-none outline-none text-xl placeholder-gray-300"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="search-actions">
        <div>
          <label class="block text-xs uppercase tracking-widest mb-1 text-gray-500">Cloud</label>
          <select
            [(ngModel)]="cloud"
            (ngModelChange)="onCloudChange()"
            class="bg-transparent border-none outline-none text-lg font-medium cursor-pointer"
          >
            <option *ngFor="let c of clouds" [value]="c.value">{{ c.label }}</option>
          </select>
        </div>
        <button class="btn !flex flex-row items-center gap-2 !py-2 !px-6" (click)="submitFullSearch()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <span>Search</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Dropdown results -->
  <div class="search-dropdown" *ngIf="isOpen">
    <!-- Loading -->
    <div *ngIf="loading" class="search-loading">
      <div class="search-spinner"></div>
      <span>Searching across all resources…</span>
    </div>

    <!-- Results grouped by category -->
    <ng-container *ngIf="!loading">
      <div *ngIf="results.length === 0 && query.trim().length >= 2" class="search-empty">
        <span class="text-gray-400">No results found for "{{ query }}"</span>
      </div>

      <div *ngFor="let group of cachedGroups" class="search-group">
        <div class="search-group-label">{{ group.label }}</div>
        <button
          *ngFor="let item of group.items"
          type="button"
          class="search-result-item"
          [class.highlighted]="highlightIndex === getResultIndex(item)"
          (click)="$event.stopPropagation(); selectResult(item)"
          (mouseenter)="highlightIndex = getResultIndex(item)"
        >
          <span class="search-result-icon">{{ item.icon }}</span>
          <div class="search-result-text">
            <span class="search-result-title">{{ item.title }}</span>
            <span class="search-result-subtitle">{{ item.subtitle }}</span>
          </div>
          <svg class="search-result-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
          </svg>
        </button>
      </div>

      <!-- "View all" link -->
      <button
        *ngIf="results.length > 0"
        class="search-view-all"
        (click)="submitFullSearch()"
      >
        View all {{ results.length }} result{{ results.length === 1 ? '' : 's' }}
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </button>
    </ng-container>
  </div>
</div>
