<section class="py-24 bg-white">
  <div class="container-lux">
    <h2 class="text-3xl md:text-5xl text-center mb-4">Kind Words</h2>
    <p class="text-center text-gray-500 mb-16">What our users say</p>
    <div class="relative max-w-3xl mx-auto">
      <div class="overflow-hidden">
        <div class="flex transition-transform duration-500 ease-out" [style.transform]="'translateX(-' + current * 100 + '%)'">
          <div *ngFor="let t of testimonials" class="w-full flex-shrink-0 px-4">
            <div class="bg-gray-50 p-8 md:p-12">
              <div class="flex items-center gap-4 mb-6">
                <img [src]="t.image" [alt]="t.name" decoding="async" fetchpriority="low" width="56" height="56" class="w-14 h-14 rounded-full object-cover" />
                <div>
                  <h4 class="font-serif font-bold text-lg">{{ t.name }}</h4>
                  <p class="text-sm text-gray-500">{{ t.location }}</p>
                </div>
              </div>
              <p class="text-gray-700 text-lg italic">“{{ t.text }}”</p>
              <div class="flex mt-4">
                <span *ngFor="let star of [1,2,3,4,5]" [class.text-black]="star <= t.rating" [class.text-gray-300]="star > t.rating">★</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button (click)="prev()" class="absolute left-0 top-1/2 -translate-y-1/2 bg-white p-3 shadow-md hover:shadow-lg transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>
      <button (click)="next()" class="absolute right-0 top-1/2 -translate-y-1/2 bg-white p-3 shadow-md hover:shadow-lg transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
      </button>
    </div>
  </div>
</section>
