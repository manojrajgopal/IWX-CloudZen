<section class="py-24">
  <div class="container-lux">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl mb-4">Featured Services</h2>
      <p class="max-w-2xl mx-auto text-gray-500">
        Handpicked cloud tools and services trusted by thousands.
      </p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
      <div *ngFor="let service of featured; trackBy: trackService" class="border border-gray-200 p-6 hover:shadow-lg transition card-hover">
        <div class="w-16 h-16 rounded-full overflow-hidden mb-4">
          <img [src]="service.icon" alt="{{ service.title }}" decoding="async" fetchpriority="low" width="128" height="128" class="w-full h-full object-cover">
        </div>
        <h3 class="text-xl font-serif font-bold mb-2">{{ service.title }}</h3>
        <p class="text-gray-500 text-sm">{{ service.description }}</p>
        <div class="mt-4 flex flex-wrap gap-2">
          <span *ngFor="let cloud of service.clouds" class="text-xs uppercase tracking-wider bg-gray-100 px-2 py-1 rounded">
            {{ cloud }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
