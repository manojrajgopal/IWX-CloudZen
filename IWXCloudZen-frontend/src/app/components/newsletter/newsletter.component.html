<section class="py-24 bg-black text-white">
  <div class="container-lux text-center">
    <h2 class="text-3xl md:text-5xl mb-4">Stay Updated</h2>
    <p class="text-gray-400 mb-8 max-w-lg mx-auto">
      Get the latest cloud tools, tips, and updates directly in your inbox.
    </p>
    <form #newsletterForm="ngForm" (ngSubmit)="onSubmit(newsletterForm)" class="max-w-md mx-auto flex flex-col sm:flex-row gap-4">
      <input type="email" name="email" ngModel required email placeholder="Your email" class="flex-1 bg-transparent border border-white/30 px-6 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-white">
      <button type="submit" class="btn btn--white !px-8 !py-3">Subscribe</button>
    </form>
  </div>
</section>
